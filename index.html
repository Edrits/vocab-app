<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c0392b" />
  <title>网语 · Netizen Vocab</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    :root {
      --red: #c0392b;
      --gold: #b8860b;
      --ink: #1a1a1a;
      --paper: #faf7f2;
      --card: #ffffff;
      --muted: #6b7280;
      --line: #ececec;
      --good: #2f9e44;
      --ok: #f59f00;
      --hard: #e8590c;
      --again: #868e96;
      --new: #adb5bd;
      --learning: #f59f00;
      --known: #2f9e44;
      --t1: #e03131; --t2: #f08c00; --t3: #2f9e44; --t4: #3b5bdb; --t0: #868e96;
      --shadow: 0 6px 24px rgba(0,0,0,.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #f2efe9; --paper: #16130f; --card: #221d17;
        --muted: #9a9187; --line: #33291f; --shadow: 0 6px 24px rgba(0,0,0,.4);
        --gold: #d4a72c;
        --t1: #ff6b6b; --t2: #ffa94d; --t3: #51cf66; --t4: #748ffc; --t0: #adb5bd;
      }
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--paper);
      color: var(--ink);
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    header {
      padding: max(env(safe-area-inset-top), 14px) 18px 10px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--line);
      background: var(--paper); z-index: 5;
    }
    .brand { display: flex; align-items: baseline; gap: 8px; }
    .brand h1 { font-size: 20px; margin: 0; letter-spacing: .5px; }
    .brand .en { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
    .stats { font-size: 12px; color: var(--muted); text-align: right; line-height: 1.45; }
    .stats b { color: var(--red); font-size: 15px; }

    .tabs { display: flex; gap: 4px; padding: 8px 12px; border-bottom: 1px solid var(--line); background: var(--paper); }
    .tab {
      flex: 1; border: none; background: none; color: var(--muted);
      font-size: 13px; font-weight: 600; padding: 8px 2px; border-radius: 10px; cursor: pointer;
    }
    .tab.active { background: color-mix(in srgb, var(--red) 12%, transparent); color: var(--red); }

    .progress-bar { height: 4px; background: var(--line); overflow: hidden; width: 100%; }
    .progress-bar.hidden { display: none; }
    .progress-fill { height: 100%; background: var(--red); width: 0%; transition: width .3s ease; }

    main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; width: 100%; }
    .wrap { width: 100%; max-width: 560px; margin: 0 auto; padding: 20px 16px; }
    main.study .wrap { min-height: 100%; display: flex; flex-direction: column; justify-content: center; }

    .card {
      background: var(--card); border-radius: 22px; box-shadow: var(--shadow);
      width: 100%; padding: 28px 24px; text-align: center; border: 1px solid var(--line);
      display: flex; flex-direction: column; gap: 14px; cursor: pointer; user-select: none;
      transition: transform .15s ease; position: relative;
    }
    .card:active { transform: scale(.99); }
    .cat {
      align-self: center; font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase;
      color: var(--red); background: color-mix(in srgb, var(--red) 12%, transparent);
      padding: 4px 12px; border-radius: 999px; font-weight: 700;
    }
    .cat.cat-chengyu { color: var(--gold); background: color-mix(in srgb, var(--gold) 16%, transparent); }
    .hanzi { font-size: 50px; font-weight: 700; line-height: 1.1; margin: 4px 0; }
    .pinyin { font-size: 20px; color: var(--muted); }
    .tap-hint { font-size: 13px; color: var(--muted); margin-top: 6px; font-style: italic; }
    .speak {
      position: absolute; top: 14px; right: 14px;
      border: 1px solid var(--line); background: var(--card); color: var(--muted);
      width: 38px; height: 38px; border-radius: 50%; font-size: 17px; cursor: pointer;
    }
    .speak:active { filter: brightness(.9); }
    .speak.inline { position: static; width: 30px; height: 30px; font-size: 14px; vertical-align: middle; margin-left: 6px; }
    .back { display: none; text-align: left; }
    .back.show { display: block; animation: fade .25s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .row { margin: 12px 0; }
    .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 3px; }
    .meaning { font-size: 17px; line-height: 1.5; }
    .meaning-zh { font-size: 16px; line-height: 1.6; margin-top: 5px; opacity: .92; }
    .literal { font-size: 14px; color: var(--muted); font-style: italic; margin-top: 5px; }
    .ex-zh { font-size: 19px; line-height: 1.5; }
    .ex-py { font-size: 14px; color: var(--muted); margin-top: 2px; }
    .ex-en { font-size: 15px; margin-top: 4px; }
    .context { font-size: 14px; line-height: 1.55; opacity: .85; }
    .divider { height: 1px; background: var(--line); margin: 6px 0; }

    .tone1 { color: var(--t1); } .tone2 { color: var(--t2); }
    .tone3 { color: var(--t3); } .tone4 { color: var(--t4); } .tone0 { color: var(--t0); }

    .grades {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
      width: 100%; max-width: 560px; margin: 0 auto; padding: 10px 16px calc(6px + env(safe-area-inset-bottom));
      flex-shrink: 0; border-top: 1px solid var(--line); background: var(--paper);
    }
    .grade { border: none; border-radius: 14px; padding: 12px 6px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; gap: 2px; align-items: center; }
    .grade small { font-weight: 500; font-size: 10px; opacity: .85; }
    .grade:active { filter: brightness(.92); }
    .g-again { background: var(--again); } .g-hard { background: var(--hard); }
    .g-ok { background: var(--ok); } .g-good { background: var(--good); }
    .grades.hidden { display: none; }

    .empty { text-align: center; color: var(--muted); padding: 40px 20px; }
    .empty h2 { color: var(--ink); }
    button.ghost { background: none; border: 1px solid var(--line); color: var(--muted); border-radius: 10px; padding: 8px 14px; font-size: 13px; cursor: pointer; }
    button.primary { background: var(--red); border: none; color: #fff; border-radius: 12px; padding: 12px 20px; font-size: 15px; font-weight: 700; cursor: pointer; }

    /* browse */
    .toolbar { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .sort-row { display: flex; align-items: center; gap: 8px; }
    .sort-row label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    select, .search {
      flex: 1; font-size: 14px; padding: 8px 10px; border-radius: 10px;
      border: 1px solid var(--line); background: var(--card); color: var(--ink);
    }
    .search { width: 100%; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      font-size: 12px; padding: 6px 12px; border-radius: 999px; cursor: pointer;
      border: 1px solid var(--line); background: var(--card); color: var(--muted); font-weight: 600;
    }
    .chip.active { background: var(--red); color: #fff; border-color: var(--red); }
    .list { display: flex; flex-direction: column; gap: 8px; }
    .item { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 12px 14px; cursor: pointer; }
    .item-head { display: flex; align-items: center; gap: 10px; }
    .item-hanzi { font-size: 22px; font-weight: 700; }
    .item-py { font-size: 14px; color: var(--muted); }
    .item-spacer { flex: 1; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .dot.new { background: var(--new); } .dot.learning { background: var(--learning); } .dot.known { background: var(--known); }
    .item-tag { font-size: 10px; text-transform: uppercase; letter-spacing: .8px; color: var(--red); font-weight: 700; }
    .item-tag.cat-chengyu { color: var(--gold); }
    .item-meaning { font-size: 14px; color: var(--ink); opacity: .8; margin-top: 6px; line-height: 1.45; }
    .item-body { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line); text-align: left; }
    .item.open .item-body { display: block; animation: fade .2s ease; }
    .item.open .item-meaning { display: none; }

    /* quiz */
    .q-progress { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; text-align: center; }
    .q-card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; box-shadow: var(--shadow); padding: 24px 20px; text-align: center; margin-bottom: 14px; }
    .q-prompt-hanzi { font-size: 40px; font-weight: 700; line-height: 1.2; }
    .q-prompt-py { font-size: 16px; color: var(--muted); margin-top: 4px; }
    .q-prompt-text { font-size: 17px; line-height: 1.5; }
    .q-type { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
    .opts { display: flex; flex-direction: column; gap: 8px; }
    .opt {
      border: 1px solid var(--line); background: var(--card); color: var(--ink);
      border-radius: 14px; padding: 13px 14px; font-size: 15px; text-align: left; cursor: pointer; line-height: 1.4;
      font-family: inherit;
    }
    .opt.hz { font-size: 22px; font-weight: 700; text-align: center; }
    .opt.correct { border-color: var(--good); background: color-mix(in srgb, var(--good) 14%, var(--card)); }
    .opt.wrong { border-color: var(--t1); background: color-mix(in srgb, var(--t1) 14%, var(--card)); }
    .opt:disabled { cursor: default; }
    .q-result { text-align: center; padding: 30px 10px; }
    .q-score { font-size: 46px; font-weight: 800; margin: 8px 0; }
    .q-verdict { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .q-xp { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
    .q-actions { display: flex; gap: 10px; justify-content: center; }

    /* me / stats */
    .sync-nudge { font-size: 13px; color: var(--muted); text-align: center; padding: 10px 14px; border: 1px dashed var(--line); border-radius: 12px; margin-bottom: 12px; }
    .panel { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 18px; margin-bottom: 12px; }
    .panel h3 { margin: 0 0 12px; font-size: 12px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); font-weight: 700; }
    .rank-row { display: flex; align-items: center; gap: 14px; }
    .rank-hanzi { font-size: 34px; font-weight: 800; line-height: 1.15; }
    .rank-py { font-size: 13px; color: var(--muted); }
    .rank-desc { font-size: 13px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
    .lv-badge { margin-left: auto; align-self: flex-start; font-size: 12px; font-weight: 800; color: var(--red); background: color-mix(in srgb, var(--red) 12%, transparent); border-radius: 999px; padding: 4px 10px; white-space: nowrap; }
    .xpbar { height: 8px; background: var(--line); border-radius: 4px; overflow: hidden; margin-top: 14px; }
    .xpbar div { height: 100%; background: linear-gradient(90deg, var(--red), var(--hard)); border-radius: 4px; }
    .xp-caption { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 5px; }
    .streak-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; }
    .streak-num { font-size: 34px; font-weight: 800; white-space: nowrap; }
    .streak-cap { font-size: 13px; color: var(--muted); }
    .heat { display: grid; grid-template-rows: repeat(7, 10px); grid-auto-flow: column; grid-auto-columns: 10px; gap: 3px; }
    .heat i { border-radius: 2px; background: var(--line); }
    .heat i.h1 { background: color-mix(in srgb, var(--good) 35%, var(--line)); }
    .heat i.h2 { background: color-mix(in srgb, var(--good) 65%, var(--line)); }
    .heat i.h3 { background: var(--good); }
    .wotd { display: flex; align-items: center; gap: 14px; cursor: pointer; }
    .wotd-hanzi { font-size: 30px; font-weight: 800; }
    .wotd-body { flex: 1; }
    .wotd-meaning { font-size: 13px; color: var(--muted); line-height: 1.4; margin-top: 3px; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; font-size: 13px; }
    .bar-label { width: 70px; color: var(--muted); }
    .bar-track { flex: 1; height: 8px; background: var(--line); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; }
    .bar-n { width: 26px; text-align: right; font-weight: 700; font-size: 12px; }
    .legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 15px; font-weight: 700; }
    .legend small { display: block; font-size: 10px; font-weight: 500; color: var(--muted); }
    .cat-counts { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .cat-counts span { font-size: 12px; border: 1px solid var(--line); border-radius: 999px; padding: 4px 10px; color: var(--muted); }

    /* dashboard */
    .dash-counts { display: flex; gap: 8px; margin: 6px 0 4px; }
    .dash-count {
      flex: 1; background: var(--paper); border: 1px solid var(--line); border-radius: 14px;
      padding: 12px 6px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
    }
    .dash-count b { display: block; font-size: 28px; color: var(--red); letter-spacing: 0; margin-bottom: 2px; }
    .dash-count.newc b { color: var(--good); }
    .start-btn { width: 100%; padding: 15px; font-size: 16px; margin-top: 12px; }
    .shelf-item { display: flex; gap: 10px; align-items: baseline; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
    .shelf-item:last-child { border-bottom: none; }
    .shelf-hanzi { font-size: 18px; font-weight: 700; white-space: nowrap; }
    .shelf-gloss { color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .warn-banner {
      background: color-mix(in srgb, var(--t1) 14%, var(--card)); border: 1px solid var(--t1);
      border-radius: 12px; padding: 10px 14px; font-size: 13px; margin-bottom: 12px;
    }
    .kv { font-size: 13px; margin: 4px 0; }
    .btn-row { display: flex; gap: 8px; margin-top: 10px; }
    .backup-area {
      width: 100%; min-height: 110px; font-size: 11px; font-family: ui-monospace, monospace;
      border-radius: 10px; border: 1px solid var(--line); background: var(--paper); color: var(--ink);
      padding: 8px; margin-top: 10px;
    }

    /* toast + confetti */
    #toasts { position: fixed; bottom: 90px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 50; pointer-events: none; }
    .toast {
      background: var(--ink); color: var(--paper); font-size: 14px; font-weight: 600;
      padding: 10px 18px; border-radius: 999px; box-shadow: var(--shadow);
      animation: toastIn .25s ease, toastOut .4s ease 2.3s forwards;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } }
    @keyframes toastOut { to { opacity: 0; transform: translateY(-8px); } }
    .confetti-bit { position: fixed; top: -30px; z-index: 60; pointer-events: none; font-size: 22px; animation: drop linear forwards; }
    @keyframes drop { to { transform: translateY(105vh) rotate(720deg); opacity: .9; } }

    footer { text-align: center; font-size: 12px; color: var(--muted); padding: 8px 0 calc(12px + env(safe-area-inset-bottom)); flex-shrink: 0; }
  </style>
</head>
<body>
  <header>
    <div class="brand"><h1>网语</h1><span class="en">Netizen Vocab</span></div>
    <div class="stats" id="stats"></div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-mode="study">Study</button>
    <button class="tab" data-mode="quiz">Quiz</button>
    <button class="tab" data-mode="browse">Browse</button>
    <button class="tab" data-mode="me">Me</button>
  </nav>

  <div class="progress-bar" id="progressWrap"><div class="progress-fill" id="progress"></div></div>

  <main id="main" class="study"><div class="wrap"><div class="card"><div class="hanzi">加载中…</div></div></div></main>

  <div class="grades hidden" id="grades">
    <button class="grade g-again" data-q="0">Again<small>&lt;1m</small></button>
    <button class="grade g-hard" data-q="1">Hard<small id="l-hard"></small></button>
    <button class="grade g-ok" data-q="2">Good<small id="l-ok"></small></button>
    <button class="grade g-good" data-q="3">Easy<small id="l-good"></small></button>
  </div>

  <div id="toasts"></div>
  <footer id="footer"></footer>

  <script>
    const SRS_KEY = 'netizen-vocab-srs-v1';
    const META_KEY = 'netizen-vocab-meta-v1';
    const catLabel = { slang:'Slang', social:'Social Trend', meme:'Meme', abbreviation:'Abbreviation', news:'News', chengyu:'Chengyu' };
    let deck = [], queue = [], current = null, showingBack = false;
    let mode = 'study';
    let sortBy = 'new', filterCat = 'all', searchText = '';

    // ---------- SRS (unchanged behaviour) ----------
    function loadJSON(key, fallback){ try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch { return fallback; } }
    let state = loadJSON(SRS_KEY, {});
    function saveState(){ localStorage.setItem(SRS_KEY, JSON.stringify(state)); scheduleSync(); }
    function cardState(id){ return state[id] || { ease:2.5, interval:0, reps:0, due:0, lapses:0 }; }
    const DAY = 86400000; const now = () => Date.now();

    function grade(id, q){
      const c = cardState(id);
      if (q === 0){ c.reps=0; c.interval=0; c.lapses++; c.ease=Math.max(1.3,c.ease-0.2); c.due=now()+60000; }
      else {
        c.reps++;
        if (q===1) c.ease=Math.max(1.3,c.ease-0.15);
        if (q===3) c.ease=c.ease+0.1;
        if (c.reps===1) c.interval = q===1?1:q===3?4:1;
        else if (c.reps===2) c.interval = q===1?3:6;
        else c.interval = Math.round(c.interval*c.ease*(q===1?0.7:q===3?1.3:1));
        c.interval = Math.max(1,c.interval);
        c.due = now()+c.interval*DAY;
      }
      state[id]=c; saveState();
    }
    function intervalLabel(id, q){
      const c = {...cardState(id)};
      if (q===0) return '<1m';
      let reps=c.reps+1, interval=c.interval, ease=c.ease;
      if (q===1) ease=Math.max(1.3,ease-0.15);
      if (q===3) ease=ease+0.1;
      if (reps===1) interval = q===1?1:q===3?4:1;
      else if (reps===2) interval = q===1?3:6;
      else interval = Math.round(interval*ease*(q===1?0.7:q===3?1.3:1));
      interval = Math.max(1,interval);
      return interval===1?'1d':interval+'d';
    }
    function knowLevel(id){
      const s = state[id];
      if (!s || s.reps===0) return { label:'New', cls:'new' };
      if (s.reps < 3) return { label:'Learning', cls:'learning' };
      return { label:'Known', cls:'known' };
    }

    // ---------- meta: XP, streak, activity ----------
    const NEW_PER_DAY = 10; // ration: max new words introduced per day
    let meta = loadJSON(META_KEY, { xp:0, activity:{}, doneBonusDate:null, newIntro:{} });
    meta.newIntro = meta.newIntro || {};
    function saveMeta(){ meta.lastSaved = Date.now(); localStorage.setItem(META_KEY, JSON.stringify(meta)); scheduleSync(); }

    // storage health check — some contexts (private browsing, embedded webviews) block it
    let storageOK = true;
    try {
      localStorage.setItem('nv-probe', '1');
      storageOK = localStorage.getItem('nv-probe') === '1';
      localStorage.removeItem('nv-probe');
    } catch { storageOK = false; }
    function isStandalone(){
      return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
        || window.navigator.standalone === true;
    }
    function todayKey(d = new Date()){
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }
    const RANKS = [
      { xp:0,    hanzi:'萌新',       py:'méngxīn',            desc:'Fresh off the boat. Everyone starts somewhere.' },
      { xp:80,   hanzi:'潜水员',     py:'qiánshuǐyuán',       desc:'The lurker: quietly reading everything, saying nothing.' },
      { xp:200,  hanzi:'吃瓜群众',   py:'chīguā qúnzhòng',    desc:'Melon-eating onlooker — here for the drama.' },
      { xp:400,  hanzi:'冲浪选手',   py:'chōnglàng xuǎnshǒu', desc:'Surfing the net like a professional.' },
      { xp:700,  hanzi:'显眼包',     py:'xiǎnyǎnbāo',         desc:'Impossible to ignore, in the best way.' },
      { xp:1100, hanzi:'互联网嘴替', py:'hùliánwǎng zuǐtì',   desc:'You say what the whole internet is thinking.' },
      { xp:1600, hanzi:'弄潮儿',     py:'nòngcháo’ér',   desc:'You don’t follow the trends. You set them.' },
      { xp:2300, hanzi:'老网虫',     py:'lǎo wǎngchóng',      desc:'A true veteran of the Chinese internet.' },
      { xp:3200, hanzi:'永远的神',   py:'yǒngyuǎn de shén',   desc:'yyds. The GOAT. Nothing left to teach you.' }
    ];
    function rankIndex(xp){ let i=0; RANKS.forEach((r,j)=>{ if (xp>=r.xp) i=j; }); return i; }
    function addXP(n){
      const before = rankIndex(meta.xp);
      meta.xp += n; saveMeta();
      const after = rankIndex(meta.xp);
      if (after > before){
        toast('升级了！你现在是 ' + RANKS[after].hanzi + ' 🎉');
        confetti();
      }
      updateStats();
    }
    function logActivity(){
      const t = todayKey();
      const first = !meta.activity[t];
      meta.activity[t] = (meta.activity[t]||0) + 1;
      saveMeta();
      if (first){ toast('打卡成功！+15 XP 🔥'); addXP(15); }
    }
    function streak(){
      let s = 0; const d = new Date();
      if (!meta.activity[todayKey(d)]) d.setDate(d.getDate()-1); // today not yet — count from yesterday
      while (meta.activity[todayKey(d)]){ s++; d.setDate(d.getDate()-1); }
      return s;
    }

    // ---------- cloud sync (PIN-keyed, via Cloudflare Worker) ----------
    const SYNC_URL = 'https://vocab-sync.neddritchie.workers.dev'; // deployed Worker URL enables sync; empty = feature hidden
    const PIN_KEY = 'netizen-vocab-sync-pin';
    const SKIP_KEY = 'netizen-vocab-sync-skip';
    let memPin = ''; // session fallback for storage-blocked contexts — sync still works there
    function syncPin(){ try { return localStorage.getItem(PIN_KEY) || memPin; } catch { return memPin; } }
    function setPin(v){ memPin = v; try { localStorage.setItem(PIN_KEY, v); } catch {} }
    function needsPinGate(){
      if (!SYNC_URL || syncPin()) return false;
      try { return localStorage.getItem(SKIP_KEY) !== '1'; } catch { return true; }
    }
    function syncEnabled(){ return !!(SYNC_URL && syncPin()); }
    let syncInfo = { status:'idle', at:0 };
    let syncTimer = null;
    function syncLabel(){
      if (!syncPin()) return 'Not set up';
      return { idle:'Ready', syncing:'Syncing…',
        synced:'Synced ✓ ' + (syncInfo.at ? new Date(syncInfo.at).toLocaleTimeString() : ''),
        error:'⚠️ Couldn’t reach the cloud — will retry' }[syncInfo.status] || '';
    }
    function paintSync(){ const el = document.getElementById('syncLine'); if (el) el.innerHTML = syncLabel(); }
    function syncBlobStr(){
      return JSON.stringify({ app:'netizen-vocab-backup', savedAt: meta.lastSaved || Date.now(), srs: state, meta });
    }
    async function syncPush(){
      if (!syncEnabled()) return;
      syncInfo.status = 'syncing'; paintSync();
      try {
        const r = await fetch(SYNC_URL, { method:'PUT', headers:{ 'X-Pin': syncPin(), 'Content-Type':'application/json' }, body: syncBlobStr() });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        syncInfo = { status:'synced', at: Date.now() };
      } catch { syncInfo.status = 'error'; }
      paintSync();
    }
    function scheduleSync(){
      if (!syncEnabled()) return;
      clearTimeout(syncTimer);
      syncTimer = setTimeout(syncPush, 1500);
    }
    async function syncPull(interactive){
      if (!syncEnabled()) return;
      syncInfo.status = 'syncing'; paintSync();
      try {
        const r = await fetch(SYNC_URL, { headers:{ 'X-Pin': syncPin() } });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const remote = await r.json();
        const localTs = meta.lastSaved || 0;
        if (remote && remote.srs && (remote.savedAt || 0) > localTs){
          state = remote.srs;
          meta = remote.meta || meta;
          meta.newIntro = meta.newIntro || {};
          localStorage.setItem(SRS_KEY, JSON.stringify(state));
          localStorage.setItem(META_KEY, JSON.stringify(meta));
          syncInfo = { status:'synced', at: Date.now() };
          if (deck.length){ buildQueue(); render(); }
          if (interactive) toast('Progress pulled from the cloud ☁️');
        } else if (localTs > ((remote && remote.savedAt) || 0)){
          await syncPush();
          if (interactive) toast('Local progress saved to the cloud ☁️');
        } else {
          syncInfo = { status:'synced', at: Date.now() };
        }
      } catch { syncInfo.status = 'error'; }
      paintSync();
    }

    // ---------- tone-coloured pinyin ----------
    const TONES = [
      ['āēīōūǖ',1],['áéíóúǘ',2],['ǎěǐǒǔǚ',3],['àèìòùǜ',4]
    ];
    function toneOf(syl){
      for (const [chars,t] of TONES) for (const ch of chars) if (syl.includes(ch)) return t;
      return 0;
    }
    const SYL_RE = /((?:zh|ch|sh|[bpmfdtnlgkhjqxrzcsyw])?[aeiouüvāáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜ]+(?:ng|n|r)?)/gi;
    function tonePinyin(str){
      if (!str) return '';
      return str.replace(SYL_RE, s => `<span class="tone${toneOf(s)}">${s}</span>`);
    }

    // ---------- speech ----------
    function speak(text){
      if (!('speechSynthesis' in window)) { toast('Speech not supported on this browser'); return; }
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'zh-CN'; u.rate = 0.85;
      const v = speechSynthesis.getVoices().find(v => v.lang && v.lang.toLowerCase().startsWith('zh'));
      if (v) u.voice = v;
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    }
    if ('speechSynthesis' in window) speechSynthesis.getVoices(); // warm the voice list
    function speakBtn(text, inline){
      return `<button class="speak${inline?' inline':''}" data-say="${text.replace(/"/g,'&quot;')}" title="Listen" aria-label="Listen">🔊</button>`;
    }
    document.addEventListener('click', e => {
      const b = e.target.closest('.speak');
      if (b){ e.stopPropagation(); speak(b.dataset.say); }
    }, true);

    // ---------- toasts + confetti ----------
    function toast(msg){
      const t = document.createElement('div');
      t.className = 'toast'; t.textContent = msg;
      document.getElementById('toasts').appendChild(t);
      setTimeout(() => t.remove(), 2800);
    }
    function confetti(){
      const EMOJI = ['🎉','✨','🎊','🔥','🀄','🧧'];
      for (let i=0;i<26;i++){
        const s = document.createElement('span');
        s.className = 'confetti-bit';
        s.textContent = EMOJI[Math.floor(Math.random()*EMOJI.length)];
        s.style.left = Math.random()*100 + 'vw';
        s.style.animationDuration = (0.9 + Math.random()*1.2) + 's';
        s.style.animationDelay = (Math.random()*0.3) + 's';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 2600);
      }
    }

    // ---------- study queue (rationed) ----------
    function quotaLeft(){ return Math.max(0, NEW_PER_DAY - (meta.newIntro[todayKey()] || 0)); }
    function dueCards(){ const t = now(); return deck.filter(c => { const s = state[c.id]; return s && s.due <= t; }); }
    function freshCards(){
      return deck.filter(c => !state[c.id])
        .sort((a,b) => (b.date_added||'').localeCompare(a.date_added||'') || a._i - b._i);
    }
    function buildQueue(){
      const t = now();
      const learning = deck.filter(c => { const s=state[c.id]; return s && s.due<=t && s.reps===0 && s.lapses>0; });
      const due = deck.filter(c => { const s=state[c.id]; return s && s.due<=t && s.reps>0; });
      const fresh = freshCards().slice(0, quotaLeft());
      queue = [...learning, ...due, ...fresh];
    }
    function updateStats(){
      const ri = rankIndex(meta.xp);
      const line2 = `🔥${streak()} · Lv.${ri+1} ${RANKS[ri].hanzi}`;
      let line1;
      if (mode === 'study') line1 = session
        ? `<b>${queue.length}</b> left today`
        : `<b>${dueCards().length + Math.min(freshCards().length, quotaLeft())}</b> today`;
      else if (mode === 'quiz') line1 = `<b>${meta.xp}</b> XP`;
      else if (mode === 'browse') line1 = `<b>${deck.filter(passesFilter).length}</b> shown`;
      else line1 = `<b>${meta.xp}</b> XP`;
      document.getElementById('stats').innerHTML = line1 + '<br>' + line2;
    }

    // ---------- render: study ----------
    function render(){ ({study:renderStudy, quiz:renderQuiz, browse:renderBrowse, me:renderMe})[mode](); }

    let session = null; // {size, reviewed, introduced} — null = show dashboard

    function renderStudy(){ session ? renderSession() : renderDashboard(); }

    function renderPinGate(){
      const main = document.getElementById('main');
      main.className = 'study';
      document.getElementById('grades').classList.add('hidden');
      document.getElementById('progressWrap').classList.add('hidden');
      main.innerHTML = `<div class="wrap"><div class="panel" style="text-align:center">
        <div style="font-size:38px;font-weight:800;margin:8px 0 2px">网语</div>
        <h3 style="margin-bottom:4px">云同步 · Cloud sync</h3>
        <p style="color:var(--muted);font-size:14px;line-height:1.5;margin:8px 0 14px">
          Enter your PIN and your streak, XP and review schedule<br>appear on this device.
          First time? Pick a PIN — it becomes yours.</p>
        <input class="search" id="gatePin" type="text" autocomplete="off" placeholder="Your PIN (4+ characters)" style="text-align:center;width:100%">
        <div class="btn-row" style="justify-content:center;margin-top:12px">
          <button class="primary" id="gateGo">Continue ☁️</button>
        </div>
        <div class="btn-row" style="justify-content:center">
          <button class="ghost" id="gateSkip">Skip — keep progress on this device only</button>
        </div>
      </div></div>`;
      document.getElementById('footer').textContent = '网语 · Netizen Vocab';
      const input = document.getElementById('gatePin');
      input.focus();
      const go = () => {
        const v = (input.value || '').trim();
        if (v.length < 4){ toast('PIN needs at least 4 characters'); return; }
        setPin(v);
        render();
        syncPull(true);
      };
      document.getElementById('gateGo').addEventListener('click', go);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
      document.getElementById('gateSkip').addEventListener('click', () => {
        try { localStorage.setItem(SKIP_KEY, '1'); } catch {}
        render();
      });
    }

    function renderDashboard(){
      const main = document.getElementById('main');
      main.className = 'study';
      document.getElementById('grades').classList.add('hidden');
      document.getElementById('progressWrap').classList.add('hidden');

      const due = dueCards().length;
      const newAvail = Math.min(freshCards().length, quotaLeft());
      const sessionSize = due + newAvail;
      const today = todayKey();
      const freshToday = deck.filter(c => c.date_added === today);
      const shelf = freshToday.length ? `<div class="panel"><h3>今日新词 · Fresh from this morning's fetch</h3>${
        freshToday.map(c => `<div class="shelf-item"><span class="shelf-hanzi">${c.hanzi}</span><span>${tonePinyin(c.pinyin)}</span><span class="shelf-gloss">${c.meaning}</span></div>`).join('')
      }</div>` : '';
      const storageWarn = storageOK ? '' :
        `<div class="warn-banner">⚠️ This browser is blocking storage — progress will NOT save here. See the Me tab.</div>`;
      const syncNudge = (SYNC_URL && !syncPin()) ?
        `<div class="sync-nudge">☁️ New: your progress can now follow you across devices — set a PIN in <b>Me → 云同步</b></div>` : '';

      main.innerHTML = `<div class="wrap">
        ${storageWarn}${syncNudge}
        <div class="panel" style="text-align:center">
          <h3>今日 · Today</h3>
          <div class="dash-counts">
            <div class="dash-count"><b>${due}</b>reviews due</div>
            <div class="dash-count newc"><b>${newAvail}</b>new words</div>
            <div class="dash-count"><b style="color:var(--hard)">${streak()}</b>🔥 streak</div>
          </div>
          ${sessionSize
            ? `<button class="primary start-btn" id="startBtn">开始 · Start today's session (${sessionSize})</button>`
            : `<p style="padding:14px 0 4px;color:var(--muted)">🎉 Nothing due — you're done for today.<br>Come back tomorrow, or test yourself in Quiz.</p>`}
        </div>
        ${shelf}
      </div>`;
      const b = document.getElementById('startBtn');
      if (b) b.addEventListener('click', startSession);
      document.getElementById('footer').textContent = `${deck.length} words in your deck`;
      updateStats();
    }

    function startSession(){
      buildQueue();
      if (!queue.length){ session = null; renderDashboard(); return; }
      session = { size: queue.length, reviewed: 0, introduced: 0 };
      renderSession();
    }

    function renderDone(){
      const main = document.getElementById('main');
      main.className = 'study';
      document.getElementById('grades').classList.add('hidden');
      document.getElementById('progress').style.width = '100%';
      const s = session || { reviewed: 0, introduced: 0 };
      session = null;
      const endTomorrow = new Date(); endTomorrow.setDate(endTomorrow.getDate()+1); endTomorrow.setHours(23,59,59,0);
      const dueTom = deck.filter(c => { const st = state[c.id]; return st && st.due > now() && st.due <= endTomorrow.getTime(); }).length;
      const newTom = Math.min(NEW_PER_DAY, freshCards().length);
      main.innerHTML = `<div class="wrap"><div class="empty">
        <h2>🎉 今日打卡完成</h2>
        <p>Session done: ${s.reviewed} card${s.reviewed===1?'':'s'} reviewed, ${s.introduced} new word${s.introduced===1?'':'s'} met.</p>
        <p style="font-size:13px">Tomorrow: ~${dueTom} review${dueTom===1?'':'s'} + up to ${newTom} new. Come back then — no cramming. 松弛感.</p>
        <div class="q-actions" style="margin-top:14px">
          <button class="ghost" id="doneBack">Back to Today</button>
          <button class="primary" id="doneQuiz">Try a Quiz</button>
        </div></div></div>`;
      document.getElementById('doneBack').addEventListener('click', renderStudy);
      document.getElementById('doneQuiz').addEventListener('click', () => setMode('quiz'));
      document.getElementById('footer').textContent = `${deck.length} words in your deck`;
      updateStats();
    }

    function renderSession(){
      const main = document.getElementById('main');
      main.className = 'study';
      const grades = document.getElementById('grades');
      document.getElementById('progressWrap').classList.remove('hidden');
      const progress = document.getElementById('progress');
      showingBack = false;

      if (!queue.length){ renderDone(); return; }
      current = queue[0];
      progress.style.width = Math.max(0, 100*(1 - queue.length/(session.size||1))) + '%';
      const c = current;
      main.innerHTML = `<div class="wrap"><div class="card" id="flip">
          ${speakBtn(c.hanzi + '。' + c.example)}
          <span class="cat cat-${c.category}">${catLabel[c.category]||c.category}</span>
          <div class="hanzi">${c.hanzi}</div>
          <div class="pinyin">${tonePinyin(c.pinyin)}</div>
          <div class="tap-hint" id="hint">tap to reveal</div>
          <div class="back" id="back">
            <div class="divider"></div>
            <div class="row"><div class="label">Meaning</div><div class="meaning">${c.meaning}</div>${c.meaning_zh?`<div class="meaning-zh">${c.meaning_zh}</div>`:''}<div class="literal">lit. ${c.literal}</div></div>
            <div class="row"><div class="label">Example</div><div class="ex-zh">${c.example}${speakBtn(c.example, true)}</div><div class="ex-py">${tonePinyin(c.example_pinyin)}</div><div class="ex-en">${c.example_translation}</div></div>
            <div class="row"><div class="label">Where it comes from</div><div class="context">${c.context}</div></div>
          </div></div></div>`;
      document.getElementById('flip').addEventListener('click', flip);
      grades.classList.add('hidden');
      document.getElementById('footer').textContent = c.hanzi + ' · ' + c.pinyin;
      document.getElementById('l-hard').textContent = intervalLabel(c.id,1);
      document.getElementById('l-ok').textContent = intervalLabel(c.id,2);
      document.getElementById('l-good').textContent = intervalLabel(c.id,3);
      updateStats();
    }
    function flip(){
      if (showingBack) return;
      showingBack = true;
      document.getElementById('back').classList.add('show');
      document.getElementById('hint').style.display = 'none';
      document.getElementById('grades').classList.remove('hidden');
    }
    function doGrade(q){
      if (!current) return;
      const firstMeeting = !state[current.id];
      grade(current.id, q);
      if (firstMeeting){
        meta.newIntro[todayKey()] = (meta.newIntro[todayKey()] || 0) + 1;
        if (session) session.introduced++;
      }
      if (session) session.reviewed++;
      logActivity();
      addXP(q===0 ? 2 : 5);
      buildQueue();
      if (!queue.length && meta.doneBonusDate !== todayKey()){
        meta.doneBonusDate = todayKey(); saveMeta();
        addXP(20); confetti();
      }
      renderSession();
    }

    // ---------- render: quiz ----------
    let quiz = null; // { qs:[{type,word,options,answer}], i, score, done }
    function makeQuiz(){
      const pool = [...deck].sort(() => Math.random()-0.5).slice(0, Math.min(8, deck.length));
      const qs = pool.map(w => {
        const others = deck.filter(o => o.id !== w.id).sort(() => Math.random()-0.5).slice(0,3);
        const types = ['h2m','m2h'];
        if (w.example && w.example.includes(w.hanzi)) types.push('blank');
        const type = types[Math.floor(Math.random()*types.length)];
        let options, answer;
        if (type === 'h2m'){ options = [w, ...others].map(o => o.meaning); answer = w.meaning; }
        else { options = [w, ...others].map(o => o.hanzi); answer = w.hanzi; }
        options.sort(() => Math.random()-0.5);
        return { type, word:w, options, answer };
      });
      return { qs, i:0, score:0, done:false, answered:false };
    }
    function renderQuiz(){
      const main = document.getElementById('main');
      main.className = 'quiz';
      document.getElementById('grades').classList.add('hidden');
      document.getElementById('progressWrap').classList.add('hidden');
      document.getElementById('footer').textContent = 'Quiz · earn XP, no effect on your review schedule';

      if (deck.length < 4){
        main.innerHTML = '<div class="wrap"><div class="empty"><h2>Need more words</h2><p>The quiz needs at least 4 words in the deck.</p></div></div>';
        return;
      }
      if (!quiz){
        main.innerHTML = `<div class="wrap"><div class="empty">
          <h2>测验 · Quiz</h2>
          <p>Eight quick questions drawn from your own deck.<br>Hanzi → meaning, meaning → hanzi, and fill-the-blank.</p>
          <button class="primary" id="qstart">开始 · Start</button></div></div>`;
        document.getElementById('qstart').addEventListener('click', () => { quiz = makeQuiz(); renderQuiz(); });
        updateStats();
        return;
      }
      if (quiz.done){
        const pct = quiz.score / quiz.qs.length;
        const verdict = pct >= 0.9 ? 'yyds！绝绝子！' : pct >= 0.7 ? '不错不错 👍' : pct >= 0.5 ? '还行，加油！' : '别内耗，再来一轮！';
        main.innerHTML = `<div class="wrap"><div class="q-result">
          <div class="q-verdict">${verdict}</div>
          <div class="q-score">${quiz.score}<span style="font-size:22px;color:var(--muted)">/${quiz.qs.length}</span></div>
          <div class="q-xp">+${quiz.score*10 + (pct>=0.8?10:0)} XP earned</div>
          <div class="q-actions">
            <button class="primary" id="qagain">再来一轮</button>
            <button class="ghost" id="qback">Back to Study</button>
          </div></div></div>`;
        document.getElementById('qagain').addEventListener('click', () => { quiz = makeQuiz(); renderQuiz(); });
        document.getElementById('qback').addEventListener('click', () => setMode('study'));
        updateStats();
        return;
      }
      const q = quiz.qs[quiz.i];
      const w = q.word;
      let promptHTML, typeLabel, optCls;
      if (q.type === 'h2m'){
        typeLabel = 'What does this mean?';
        promptHTML = `<div class="q-prompt-hanzi">${w.hanzi}</div><div class="q-prompt-py">${tonePinyin(w.pinyin)}</div>`;
        optCls = '';
      } else if (q.type === 'm2h'){
        typeLabel = 'Which word is this?';
        promptHTML = `<div class="q-prompt-text">${w.meaning}</div>`;
        optCls = 'hz';
      } else {
        typeLabel = 'Fill the blank';
        promptHTML = `<div class="q-prompt-text" style="font-size:20px">${w.example.split(w.hanzi).join('<span style="color:var(--red);font-weight:800">＿＿</span>')}</div>
          <div class="q-prompt-py" style="margin-top:8px">${w.example_translation}</div>`;
        optCls = 'hz';
      }
      main.innerHTML = `<div class="wrap">
        <div class="q-progress">${quiz.i+1} / ${quiz.qs.length} · score ${quiz.score}</div>
        <div class="q-card"><div class="q-type">${typeLabel}</div>${promptHTML}</div>
        <div class="opts">${q.options.map(o => `<button class="opt ${optCls}" data-v="${o.replace(/"/g,'&quot;')}">${o}</button>`).join('')}</div>
      </div>`;
      main.querySelectorAll('.opt').forEach(btn => btn.addEventListener('click', () => answerQuiz(btn)));
      updateStats();
    }
    function answerQuiz(btn){
      if (quiz.answered) return;
      quiz.answered = true;
      const q = quiz.qs[quiz.i];
      const right = btn.dataset.v === q.answer;
      document.querySelectorAll('.opt').forEach(b => {
        b.disabled = true;
        if (b.dataset.v === q.answer) b.classList.add('correct');
      });
      if (!right) btn.classList.add('wrong');
      if (right) quiz.score++;
      logActivity();
      addXP(right ? 10 : 2);
      setTimeout(() => {
        quiz.i++; quiz.answered = false;
        if (quiz.i >= quiz.qs.length){
          quiz.done = true;
          const pct = quiz.score/quiz.qs.length;
          if (pct >= 0.8){ addXP(10); confetti(); }
        }
        renderQuiz();
      }, right ? 650 : 1400);
    }

    // ---------- render: browse ----------
    function passesFilter(c){
      if (filterCat !== 'all' && c.category !== filterCat) return false;
      if (searchText){
        const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
        const q = norm(searchText);
        return norm(c.hanzi).includes(q) || norm(c.pinyin).includes(q) || norm(c.meaning).includes(q) || norm(c.meaning_zh).includes(q);
      }
      return true;
    }
    const sorters = {
      new:  (a,b) => (b.date_added||'').localeCompare(a.date_added||'') || a._i - b._i,
      old:  (a,b) => (a.date_added||'').localeCompare(b.date_added||'') || a._i - b._i,
      pinyin: (a,b) => a.pinyin.localeCompare(b.pinyin, 'en', {sensitivity:'base'}),
      category: (a,b) => (catLabel[a.category]||a.category).localeCompare(catLabel[b.category]||b.category) || a.pinyin.localeCompare(b.pinyin),
      known: (a,b) => { const ra=(state[a.id]?.reps)||0, rb=(state[b.id]?.reps)||0; return ra-rb || (state[a.id]?.interval||0)-(state[b.id]?.interval||0); }
    };
    function renderBrowse(){
      const main = document.getElementById('main');
      main.className = 'browse';
      document.getElementById('grades').classList.add('hidden');
      document.getElementById('progressWrap').classList.add('hidden');
      document.getElementById('footer').textContent = `${deck.length} words in your deck`;

      const cats = ['all', ...Array.from(new Set(deck.map(c=>c.category)))];
      const chips = cats.map(cat =>
        `<button class="chip ${cat===filterCat?'active':''}" data-cat="${cat}">${cat==='all'?'All':(catLabel[cat]||cat)}</button>`
      ).join('');

      const rows = deck.filter(passesFilter).sort(sorters[sortBy]).map(c => {
        const k = knowLevel(c.id);
        return `<div class="item" data-id="${c.id}">
            <div class="item-head">
              <span class="item-hanzi">${c.hanzi}</span>
              <span class="item-py">${tonePinyin(c.pinyin)}</span>
              <span class="item-spacer"></span>
              <span class="item-tag cat-${c.category}">${catLabel[c.category]||c.category}</span>
              <span class="dot ${k.cls}" title="${k.label}"></span>
            </div>
            <div class="item-meaning">${c.meaning}</div>
            <div class="item-body">
              <div class="row"><div class="label">Meaning</div><div class="meaning">${c.meaning}</div>${c.meaning_zh?`<div class="meaning-zh">${c.meaning_zh}</div>`:''}<div class="literal">lit. ${c.literal}</div></div>
              <div class="row"><div class="label">Example</div><div class="ex-zh">${c.example}${speakBtn(c.example, true)}</div><div class="ex-py">${tonePinyin(c.example_pinyin)}</div><div class="ex-en">${c.example_translation}</div></div>
              <div class="row"><div class="label">Where it comes from</div><div class="context">${c.context}</div></div>
              <div class="row"><div class="label">Status</div><div class="meaning">${k.label}${speakBtn(c.hanzi, true)}</div></div>
            </div>
          </div>`;
      }).join('');

      main.innerHTML = `<div class="wrap">
        <div class="toolbar">
          <input class="search" id="search" type="search" placeholder="搜索 · search hanzi, pinyin or meaning" value="${searchText.replace(/"/g,'&quot;')}">
          <div class="sort-row">
            <label for="sort">Sort</label>
            <select id="sort">
              <option value="new">Newest added</option>
              <option value="old">Oldest added</option>
              <option value="pinyin">Pinyin A–Z</option>
              <option value="category">Category</option>
              <option value="known">Least known first</option>
            </select>
          </div>
          <div class="chips">${chips}</div>
        </div>
        <div class="list">${rows || '<div class="empty">Nothing matches.</div>'}</div>
      </div>`;

      const sel = document.getElementById('sort');
      sel.value = sortBy;
      sel.addEventListener('change', e => { sortBy = e.target.value; renderBrowse(); });
      const search = document.getElementById('search');
      search.addEventListener('input', e => {
        searchText = e.target.value;
        const pos = search.selectionStart;
        renderBrowse();
        const s2 = document.getElementById('search');
        s2.focus(); s2.setSelectionRange(pos,pos);
      });
      main.querySelectorAll('.chip').forEach(ch => ch.addEventListener('click', () => { filterCat = ch.dataset.cat; renderBrowse(); }));
      main.querySelectorAll('.item').forEach(it => it.addEventListener('click', e => {
        if (!e.target.closest('.speak')) it.classList.toggle('open');
      }));
      updateStats();
    }

    // ---------- render: me ----------
    function renderMe(){
      const main = document.getElementById('main');
      main.className = 'me';
      document.getElementById('grades').classList.add('hidden');
      document.getElementById('progressWrap').classList.add('hidden');
      document.getElementById('footer').textContent = '网语 · your netizen journey';

      const ri = rankIndex(meta.xp);
      const rank = RANKS[ri], next = RANKS[ri+1];
      const pct = next ? Math.min(100, Math.round(100*(meta.xp - rank.xp)/(next.xp - rank.xp))) : 100;

      // heatmap: last 70 days, oldest first, aligned into 7-row columns
      const days = [];
      for (let i=69; i>=0; i--){
        const d = new Date(); d.setDate(d.getDate()-i);
        const n = meta.activity[todayKey(d)] || 0;
        days.push(n === 0 ? '' : n <= 5 ? 'h1' : n <= 15 ? 'h2' : 'h3');
      }
      const heat = days.map(c => `<i class="${c}"></i>`).join('');

      // word of the day (deterministic per date)
      const seed = parseInt(todayKey().replace(/-/g,''),10) % deck.length;
      const w = deck[seed];

      const counts = { new:0, learning:0, known:0 };
      deck.forEach(c => counts[knowLevel(c.id).cls]++);
      const catCounts = {};
      deck.forEach(c => catCounts[c.category] = (catCounts[c.category]||0)+1);
      const barRow = (label, n, colour) =>
        `<div class="bar-row"><span class="bar-label">${label}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${deck.length?Math.round(100*n/deck.length):0}%;background:${colour}"></div></div>
          <span class="bar-n">${n}</span></div>`;

      main.innerHTML = `<div class="wrap">
        <div class="panel">
          <h3>Netizen rank</h3>
          <div class="rank-row">
            <div>
              <div class="rank-hanzi">${rank.hanzi}</div>
              <div class="rank-py">${tonePinyin(rank.py)}</div>
              <div class="rank-desc">${rank.desc}</div>
            </div>
            <span class="lv-badge">Lv.${ri+1} · ${meta.xp} XP</span>
          </div>
          <div class="xpbar"><div style="width:${pct}%"></div></div>
          <div class="xp-caption"><span>${rank.hanzi}</span><span>${next ? next.xp - meta.xp + ' XP to ' + next.hanzi : 'MAX — 永远的神'}</span></div>
        </div>

        <div class="panel">
          <h3>打卡 · Streak</h3>
          <div class="streak-row"><span class="streak-num">🔥 ${streak()}</span><span class="streak-cap">day${streak()===1?'':'s'} in a row — study daily to keep the flame alive</span></div>
          <div class="heat">${heat}</div>
        </div>

        <div class="panel">
          <h3>今日一词 · Word of the day</h3>
          <div class="wotd" id="wotd">
            <span class="wotd-hanzi">${w.hanzi}</span>
            <div class="wotd-body">
              <div>${tonePinyin(w.pinyin)}</div>
              <div class="wotd-meaning">${w.meaning}</div>
            </div>
            ${speakBtn(w.hanzi + '。' + w.example, true)}
          </div>
        </div>

        <div class="panel">
          <h3>Deck mastery</h3>
          ${barRow('Known', counts.known, 'var(--known)')}
          ${barRow('Learning', counts.learning, 'var(--learning)')}
          ${barRow('New', counts.new, 'var(--new)')}
          <div class="cat-counts">${Object.entries(catCounts).map(([c,n]) => `<span>${catLabel[c]||c} · ${n}</span>`).join('')}</div>
        </div>

        ${SYNC_URL ? `<div class="panel">
          <h3>云同步 · Cloud sync</h3>
          ${syncPin() ? `
            <div class="kv">Status: <b id="syncLine">${syncLabel()}</b></div>
            <div class="kv" style="color:var(--muted);font-size:12px">Saves to the cloud moments after every change; loads wherever you enter the same PIN. Last-writer wins.</div>
            <div class="btn-row">
              <button class="ghost" id="syncNow">Sync now</button>
              <button class="ghost" id="syncOff">Turn off on this device</button>
            </div>`
          : `
            <div class="kv" style="color:var(--muted);font-size:12px">Pick a PIN — 4+ characters, a word plus digits is best (e.g. mango88). Enter the same PIN on any device and your streak, XP and review schedule follow you. Don’t reuse a password you care about.</div>
            <input class="search" id="pinInput" type="text" autocomplete="off" placeholder="Choose your PIN">
            <div class="btn-row"><button class="primary" id="syncOn">Enable sync</button></div>`}
        </div>` : ''}

        <div class="panel">
          <h3>Storage &amp; backup</h3>
          ${storageOK ? '' : '<div class="warn-banner">⚠️ Storage is blocked in this browser context — progress cannot save here.</div>'}
          <div class="kv">Running as: <b>${isStandalone() ? 'installed app (home screen)' : 'browser tab'}</b></div>
          <div class="kv" style="color:var(--muted);font-size:12px">The installed app and the browser keep <i>separate</i> progress on iPhone — pick one and stick to it.</div>
          <div class="kv">Last saved: <b>${meta.lastSaved ? new Date(meta.lastSaved).toLocaleString() : '— nothing saved yet'}</b></div>
          <div class="btn-row">
            <button class="ghost" id="backupBtn">Copy backup</button>
            <button class="ghost" id="restoreBtn">Restore…</button>
          </div>
          <textarea class="backup-area" id="backupArea" style="display:none"></textarea>
          <div class="btn-row" id="loadRow" style="display:none"><button class="primary" id="loadBtn">Load backup</button></div>
        </div>

        <div class="panel">
          <h3>Tone colours</h3>
          <div class="legend">
            <span class="tone1">mā<small>1st flat</small></span>
            <span class="tone2">má<small>2nd rising</small></span>
            <span class="tone3">mǎ<small>3rd dipping</small></span>
            <span class="tone4">mà<small>4th falling</small></span>
            <span class="tone0">ma<small>neutral</small></span>
          </div>
        </div>
      </div>`;
      document.getElementById('backupBtn').addEventListener('click', () => {
        const blob = JSON.stringify({ app:'netizen-vocab-backup', exported:new Date().toISOString(), srs:state, meta });
        const ta = document.getElementById('backupArea');
        const fallback = () => { ta.style.display='block'; ta.value = blob; ta.select(); toast('Copy the text below and keep it safe'); };
        if (navigator.clipboard && navigator.clipboard.writeText)
          navigator.clipboard.writeText(blob).then(() => toast('Backup copied 📋 — paste it somewhere safe')).catch(fallback);
        else fallback();
      });
      document.getElementById('restoreBtn').addEventListener('click', () => {
        const ta = document.getElementById('backupArea');
        ta.style.display='block'; ta.value=''; ta.placeholder='Paste your backup here, then press Load';
        document.getElementById('loadRow').style.display='flex'; ta.focus();
      });
      const syncOn = document.getElementById('syncOn');
      if (syncOn) syncOn.addEventListener('click', () => {
        const v = (document.getElementById('pinInput').value || '').trim();
        if (v.length < 4){ toast('PIN needs at least 4 characters'); return; }
        setPin(v);
        renderMe();
        toast('Sync enabled ☁️');
        syncPull(true);
      });
      const syncNow = document.getElementById('syncNow');
      if (syncNow) syncNow.addEventListener('click', () => syncPull(true));
      const syncOff = document.getElementById('syncOff');
      if (syncOff) syncOff.addEventListener('click', () => {
        memPin = '';
        try { localStorage.removeItem(PIN_KEY); localStorage.setItem(SKIP_KEY, '1'); } catch {}
        toast('Sync turned off on this device');
        renderMe();
      });
      document.getElementById('loadBtn').addEventListener('click', () => {
        try {
          const b = JSON.parse(document.getElementById('backupArea').value);
          if (b.app !== 'netizen-vocab-backup' || !b.srs || !b.meta) throw new Error('bad');
          b.meta.lastSaved = Date.now(); // a deliberate restore counts as the newest state, so sync won't overwrite it
          localStorage.setItem(SRS_KEY, JSON.stringify(b.srs));
          localStorage.setItem(META_KEY, JSON.stringify(b.meta));
          toast('Backup restored ✅');
          setTimeout(() => location.reload(), 700);
        } catch { toast('That doesn\'t look like a valid 网语 backup'); }
      });
      updateStats();
    }

    // ---------- mode switching ----------
    function setMode(m){
      mode = m;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode===m));
      if (m === 'study'){ buildQueue(); }
      if (m !== 'quiz') quiz = null;
      render();
    }
    document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => setMode(t.dataset.mode)));
    document.getElementById('grades').addEventListener('click', e => {
      const btn = e.target.closest('.grade'); if (btn) doGrade(parseInt(btn.dataset.q,10));
    });
    document.addEventListener('keydown', e => {
      if (mode === 'study' && session){
        if (e.code === 'Space'){ e.preventDefault(); flip(); }
        if (['1','2','3','4'].includes(e.key) && showingBack) doGrade(parseInt(e.key,10)-1);
      } else if (mode === 'quiz' && quiz && !quiz.done && ['1','2','3','4'].includes(e.key)){
        const opts = document.querySelectorAll('.opt');
        const i = parseInt(e.key,10)-1;
        if (opts[i]) answerQuiz(opts[i]);
      }
    });

    // ---------- load ----------
    document.addEventListener('visibilitychange', () => { if (!document.hidden) syncPull(); });
    fetch('vocab.json?_=' + Date.now()).then(r => r.json()).then(data => {
      deck = data.map((c,i) => ({ ...c, _i:i }));
      buildQueue();
      if (needsPinGate()){ renderPinGate(); }
      else { render(); syncPull(); }
    }).catch(err => {
      document.getElementById('main').innerHTML = '<div class="wrap"><div class="empty"><h2>Couldn\'t load vocab</h2><p>'+err+'</p></div></div>';
    });
  </script>
</body>
</html>
